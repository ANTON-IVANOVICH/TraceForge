# A single-node TraceForge, the way you would run it on a laptop or a VM.
#
#   docker compose -f deploy/compose.yaml up --build -d
#   open http://localhost:8080          # the dashboard
#   open http://localhost:9091/metrics  # what Prometheus scrapes
#
# Kubernetes gets the Helm chart in deploy/charts. This file exists because the
# manifests are hard to try, and a thing nobody tries is a thing nobody trusts.
#
# The observability stack is a separate profile, so `up` stays fast:
#
#   docker compose -f deploy/compose.yaml --profile observability up -d

name: traceforge

services:
  server:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: server
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: traceforge/server:${TAG:-dev}
    command:
      - -storage=tsdb
      - -data-dir=/var/lib/traceforge
      - -telemetry-addr=:9091
      # Behind a load balancer this is what stops a rolling restart from serving
      # 502s: readiness fails first, the balancer notices, and only then do the
      # listeners close. Locally there is nothing to notice, so it is short.
      - -shutdown-delay=2s
    ports:
      - "8080:8080" # HTTP API + dashboard
      - "9090:9090" # gRPC
      - "9091:9091" # /healthz /readyz /startupz /metrics
    volumes:
      - server-data:/var/lib/traceforge
    # The image declares its own HEALTHCHECK (the binary probes its own /readyz),
    # so nothing needs to be repeated here. `depends_on: service_healthy` below is
    # what turns it into a startup ordering guarantee.
    stop_grace_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL

  agent:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: agent
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: traceforge/agent:${TAG:-dev}
    command:
      - -server=http://server:8080/api/v1/metrics
      - -interval=5s
      - -telemetry-addr=:9101
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "9101:9101"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL

  # ---------------------------------------------------------------------------
  # Who watches the watchmen. A metrics system that does not export its own
  # metrics is a metrics system nobody can operate.
  # ---------------------------------------------------------------------------

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v3.7.3
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
      - --web.enable-lifecycle
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    ports:
      - "9095:9090"
    depends_on:
      server:
        condition: service_healthy

  grafana:
    profiles: [observability]
    image: grafana/grafana:12.3.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Grafana's own telemetry, off. This is a demo stack, not a data source.
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  server-data:
  prometheus-data:
