{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "traceforge.serviceAccountName" . }}
  labels:
    {{- include "traceforge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Neither the server nor the agent calls the Kubernetes API, so the mounted token
# is a credential with no purpose and a real liability. Default it off; a caller
# who wires up a controller can flip it in values.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
