# Source: traceforge/templates/agent-daemonset.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: traceforge-agent
  labels:
    helm.sh/chart: traceforge-0.11.0
    app.kubernetes.io/name: traceforge
    app.kubernetes.io/instance: traceforge
    app.kubernetes.io/version: "0.11.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: traceforge
      app.kubernetes.io/instance: traceforge
      app.kubernetes.io/component: agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traceforge
        app.kubernetes.io/instance: traceforge
        app.kubernetes.io/component: agent
      annotations:
        # Mutually exclusive with the ServiceMonitor: with both present, a cluster
        # that runs the operator and an annotation-based pod-discovery job scrapes
        # every pod twice. See server-statefulset.yaml.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: traceforge
      automountServiceAccountToken: false
      # The agent has nothing to drain — no listener carries user traffic and the
      # next tick's batch is worth nothing — but it does hold a libpcap handle when
      # capture is on, and Kubernetes kills what it does not wait for. Ten seconds
      # is far more than Agent.Run needs to leave the capture loop and close the
      # handle; it exists so that the kubelet's SIGKILL is never the thing that
      # frees a C pointer a goroutine is still inside.
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # Tolerate ALL taints so the agent also lands on control-plane and otherwise
      # tainted nodes — a node with no agent is a blind spot you cannot see into.
      tolerations:
        - operator: Exists
      containers:
        - name: agent
          image: traceforge/agent:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -transport=http
            - -server=http://traceforge-server:8080/api/v1/metrics
            - -interval=15s
            - -telemetry-addr=:9101
            - -log-level=info
            - -memory-limit-ratio=0.9
            - -http-timeout=10s
            - -http-retries=2
            - -http-backoff=200ms
          env:
            # -id defaults to the hostname; pin it to the NODE name so every
            # sample is attributable to a node even across pod restarts. Env, not
            # a flag, because it comes from the downward API.
            - name: AGENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # NO GOMAXPROCS/GOMEMLIMIT env: since Go 1.25 the runtime derives both
            # from the cgroup and keeps updating GOMAXPROCS; the binary sets its
            # own soft memory limit from -memory-limit-ratio. Freezing either here
            # would mis-size the runtime after a resize.
          ports:
            - name: telemetry
              containerPort: 9101
          startupProbe:
            httpGet:
              path: /startupz
              port: telemetry
            # Generous: initial TSDB replay can take a while. failureThreshold*periodSeconds
            # is the total boot budget before the pod is declared failed.
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: telemetry
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: telemetry
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              # Drop everything, then — under capture only — add back exactly the
              # two the raw-socket capture path needs and nothing else.
              drop:
                - ALL
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            # readOnlyRootFilesystem is on for the agent too, so /tmp must be a
            # writable emptyDir for scratch space.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
