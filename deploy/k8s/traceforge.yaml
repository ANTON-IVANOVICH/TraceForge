# Source: traceforge/templates/server-pdb.yaml
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: traceforge-server
  labels:
    helm.sh/chart: traceforge-0.11.0
    app.kubernetes.io/name: traceforge
    app.kubernetes.io/instance: traceforge
    app.kubernetes.io/version: "0.11.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: server
spec:
  # maxUnavailable, not minAvailable: with a single replica, minAvailable:1 would
  # pin the pod and BLOCK every voluntary node drain forever. maxUnavailable:1
  # instead lets a drain evict the pod (it reschedules with its PVC) while still
  # protecting against an involuntary budget breach when replicas>1.
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traceforge
      app.kubernetes.io/instance: traceforge
      app.kubernetes.io/component: server
