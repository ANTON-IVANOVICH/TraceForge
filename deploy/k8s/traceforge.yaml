# Source: traceforge/templates/server-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: traceforge-server
  labels:
    helm.sh/chart: traceforge-0.11.0
    app.kubernetes.io/name: traceforge
    app.kubernetes.io/instance: traceforge
    app.kubernetes.io/version: "0.11.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: server
spec:
  serviceName: traceforge-server-headless
  # replicas comes straight from values and is 1 by default AND in prod. The
  # server has no replication; see values-prod.yaml for why >1 is data loss.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traceforge
      app.kubernetes.io/instance: traceforge
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traceforge
        app.kubernetes.io/instance: traceforge
        app.kubernetes.io/component: server
      annotations:
        # Scrape annotations, for a Prometheus that discovers pods directly.
        #
        # They are mutually exclusive with the ServiceMonitor, which is why they are
        # gated on it. A cluster running the operator typically also runs an
        # annotation-based pod-discovery job, and with both present every pod is
        # discovered twice: the same series arrive under two target labels, doubling
        # the scrape load and — when the differing labels are dropped by a relabel
        # rule — producing "duplicate sample for timestamp" rejections.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: traceforge
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      # timeout (30s) + graceBuffer (15s) = 45s of head-room.
      terminationGracePeriodSeconds: 45
      # NO preStop "sleep" hook: the distroless image has no shell to run one, and
      # -shutdown-delay does exactly that job INSIDE the process — it fails
      # readiness first so the load balancer drains the endpoint, then waits, then
      # closes listeners. A hook would be a redundant second timer with no shell.
      affinity:
        # Preferred (not required) so a single-node cluster still schedules; when
        # replicas>1 it keeps them off the same node without blocking the pod.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: traceforge
                    app.kubernetes.io/instance: traceforge
                    app.kubernetes.io/component: server
      containers:
        - name: server
          image: traceforge/server:0.11.0
          imagePullPolicy: IfNotPresent
          args:
            - -addr=:8080
            - -grpc-addr=:9090
            - -telemetry-addr=:9091
            - -storage=tsdb
            - -data-dir=/data
            - -log-level=info
            - -ingest-buffer=1000
            - -store-workers=1
            - -rate-limit-rps=100
            - -rate-limit-burst=200
            - -ui=true
            - -shutdown-delay=5s
            - -shutdown-timeout=30s
            - -memory-limit-ratio=0.9
          env:
            # NO GOMAXPROCS from the downward API: since Go 1.25 the runtime reads
            # the cgroup CPU quota and keeps re-deriving GOMAXPROCS as the quota
            # changes; pinning the env var freezes that at the launch-time value
            # and mis-sizes the scheduler after a vertical resize.
            # NO GOMEMLIMIT either: the binary derives it from the cgroup memory
            # limit via -memory-limit-ratio; setting it here would override that.
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
            - name: telemetry
              containerPort: 9091
          startupProbe:
            httpGet:
              path: /startupz
              port: telemetry
            # Generous: initial TSDB replay can take a while. failureThreshold*periodSeconds
            # is the total boot budget before the pod is declared failed.
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: telemetry
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: telemetry
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            # The data PVC. With a read-only root filesystem this is the only
            # writable place bolt/tsdb can persist to.
            - name: data
              mountPath: /data
            # /tmp must be a writable emptyDir precisely because the root fs is
            # read-only; the process still needs scratch space for temp files.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
  # The data directory is a per-pod PVC, not a shared one: each server owns its
  # own store. This is also what makes storage=tsdb persistent across restarts.
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: traceforge
          app.kubernetes.io/instance: traceforge
          app.kubernetes.io/component: server
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
