# File provider: Grafana loads every dashboard JSON dropped into the path below.
# The compose file mounts deploy/dashboards there read-only, so the JSON in git
# is the single source of truth — edits in the UI do not persist, by design.
apiVersion: 1

providers:
  - name: TraceForge
    orgId: 1
    folder: TraceForge
    type: file
    disableDeletion: true
    editable: false
    # allowUiUpdates stays off: the dashboards are code-reviewed, not hand-tuned.
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
